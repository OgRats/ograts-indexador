<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OgRats Leaderboard Oficial</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #f3ba2f; margin-bottom: 5px; }
        p { color: #8a8d98; margin-top: 0; }
        .container {
            width: 100%;
            max-width: 700px;
            background: #1a1b1f;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2a2b31;
        }
        th { color: #f3ba2f; font-weight: 600; }
        tr:hover { background-color: #222329; }
        .loading { text-align: center; color: #8a8d98; padding: 20px; }
    </style>
</head>
<body>

    <h1>🏆 OgRats Leaderboard</h1>
    <p>Clasificación por acumulación de puntos (1 NFT = 1 Punto)</p>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Puesto</th>
                    <th>Usuario / Billetera</th>
                    <th>NFTs Holdeados</th>
                    <th>Total Puntos</th>
                </tr>
            </thead>
            <tbody id="tabla-body">
                <tr>
                    <td colspan="4" class="loading">Cargando clasificación real...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // Credenciales oficiales y seguras de tu proyecto
        const SUPABASE_URL = "https://bcclyutxzbbgvarypfwd.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjY2x5dXR4emJiZ3ZhcnlwZndkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwOTY1NDksImV4cCI6MjA5ODY3MjU0OX0.4DUTMdbttMB-Yk25qB5rUlLkV0DgKDWNcuuwjI2rK6E";

        async function cargarLeaderboard() {
            // Consulta directa ordenando por puntos de forma descendente
            const urlFetch = `${SUPABASE_URL}/rest/v1/ograts_holders?select=*&order=puntos.desc`;

            try {
                const response = await fetch(urlFetch, {
                    method: "GET",
                    headers: {
                        "apikey": SUPABASE_ANON_KEY,
                        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                        "Content-Type": "application/json"
                    }
                });

                if (!response.ok) throw new Error("Error conectando con Supabase");
                
                const datos = await response.json();
                const tbody = document.getElementById('tabla-body');
                tbody.innerHTML = '';

                if (datos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="loading">No hay datos todavía. Ejecuta el indexador.</td></tr>';
                    return;
                }

                datos.forEach((user, index) => {
                    const fila = document.createElement('tr');
                    const walletCorta = user.address.substring(0, 6) + '...' + user.address.substring(user.address.length - 4);
                    
                    // Mostramos el username de OpenSea con un @ si existe, si no, la wallet acortada
                    const nombreMostrar = user.username ? `@${user.username}` : walletCorta;
                    
                    fila.innerHTML = `
                        <td><strong>#${index + 1}</strong></td>
                        <td title="${user.address}">${nombreMostrar}</td>
                        <td>📦 ${user.balance} NFTs</td>
                        <td>⭐ ${user.puntos} pts</td>
                    `;
                    tbody.appendChild(fila);
                });
            } catch (error) {
                console.error(error);
                document.getElementById('tabla-body').innerHTML = '<tr><td colspan="4" class="loading" style="color:red;">Error al cargar el leaderboard real</td></tr>';
            }
        }

        cargarLeaderboard();
    </script>
</body>
</html>
